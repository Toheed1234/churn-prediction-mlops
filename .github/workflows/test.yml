name: CI Pipeline

# Trigger this workflow automatically when we push code to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We also need to install pytest explicitly in CI
        pip install -r requirements.txt pytest httpx

    # If the tests fail, the GitHub Action will stop here with a big Red 'X', preventing a broken deployment
    - name: Run Pytest suite
      run: |
        python train.py
        pytest test_app.py -v
